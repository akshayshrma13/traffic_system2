name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git inside the GitHub Runner to handle LFS pushes
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          git push -f https://Bikki26:$HF_TOKEN@huggingface.co/spaces/Bikki26/traffic-management-system main